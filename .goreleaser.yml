# GoReleaser configuration
# Documentation: https://goreleaser.com

version: 2

project_name: wizask

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: wizask
    main: .
    binary: wizask
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 6
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: arm
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: wizdo
    main: ./cmd/wizdo
    binary: wizdo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 6
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: arm
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats: [ 'tar.gz' ]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: xmonader
    name: wizaskdo
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}}-v{{.Version}}"

homebrews:
  - name: wizask
    repository:
      owner: xmonader
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/xmonader/wizaskdo
    description: "AI-powered terminal assistant"
    license: MIT
    test: |
      system "#{bin}/wizask", "--help"
    install: |
      bin.install "wizask"
      bin.install "wizdo"

nfpms:
  - id: packages
    package_name: wizask
    vendor: xmonader
    homepage: https://github.com/xmonader/wizaskdo
    maintainer: xmonader <xmonader@gmail.com>
    description: AI-powered terminal assistant
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    dependencies:
      - git
    recommends:
      - bash
      - zsh
    bindir: /usr/bin
